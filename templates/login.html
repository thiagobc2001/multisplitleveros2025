<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Selecionar Fornecedor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-[#003A3F] to-[#007C6D] min-h-screen flex items-center justify-center">
  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md text-center">
    <h1 class="text-3xl font-bold text-[#005A64] mb-6">Simulador Multisplit</h1>
    <form action="/simulador" method="get">
      <button type="submit"
        class="bg-[#005A64] text-white font-semibold py-2 px-6 rounded-lg hover:bg-[#004B58] transition w-full">
        Acessar Simulador
      </button>
    </form>
  </div>
</body>
</html>
